<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <meta name="theme-color" content="#000000">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <title>Flomation Form</title>

    <style>
        :root {
            --background-colour: #161019;
            --primary-foreground: #460070;
            --primary-background: #33263a;
            --primary-background-muted: #18121c;
            --secondary-background: #00aa9c;
            --primary-font-colour: #fff;
            --secondary-font-colour: #ae9fb9;
            --secondary-action-colour: #0a0;
            --error-action-colour: #be0000;
            --highlight-colour: #48abe0;
            --primary-input-colour: #17202e;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: "Poppins", sans-serif;
            font-size: .95em;
            color: var(--primary-font-colour);
            background: radial-gradient(at top left, var(--background-colour), var(--primary-background));
            overflow: hidden;
        }

        h1 {
            font-weight: 200;
        }

        .disabled {
            opacity: 0.5;
        }

        button {
            border: 1px solid var(--background-colour);
            background-color: var(--primary-background);
            padding: 20px;
            border-radius: 5px;
            color: var(--primary-font-colour);
            cursor: pointer;
        }

        .button-container {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            width: 100%;
            height: 100%;

            display: flex;
            text-align: center;
            /*justify-content: center;*/

            flex-direction: column;
            flex: 1;
        }

        .container > footer {

        }

        .form-container {
            height: 100%;
            justify-items: center;
        }

        .form-body {
            text-align: left;

            width: 80%;
            display: flex;

            flex-direction: column;
        }

        @media (min-width: 768px) {
            .form-body {
                width: 50%;
            }
        }

        .form-label {
            margin-top: 25px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-background);
            color: var(--primary-font-colour);
            outline: none;
            border: 0;
            box-sizing: border-box;
            height: 50px;
            font-size: 1.2em;
            font-weight: 100;
        }

        input:disabled {
            opacity: 0.5;
        }

        input:focus {
            box-shadow: 0 0 10px 1px var(--highlight-colour);
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            background-color: var(--primary-background);
            color: var(--primary-font-colour);
            outline: none;
            border: 0;
            box-sizing: border-box;
            resize: vertical;
            font-family: "Poppins", sans-serif;
            font-size: 1.2em;
            /*font-weight: 100;*/
        }

        .hidden {
            display: none;
        }

        .flomation-logo {
            height: 25px;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>
    <noscript>
        You need to enable JavaScript to run this app.
    </noscript>

    <div class="container">
        <div class="form-container" id="form-container">
            <h1 id="form-header">
                Form Header
            </h1>
            <p id="form-description">

            </p>

            <div class="form-body" id="form-body">

            </div>
        </div>

        <footer>
            <a href="https://www.flomation.co" target="_blank" title="Powered by Flomation"><img class="flomation-logo" src="/flomation-wordtype-small-white.png" alt="Powered by Flomation"/></a>
        </footer>
    </div>

    <script>
        const formData = atob("{{ .Form }}");
        let formValues = {};

        function sortFunction(a, b) {
            if (a.order < b.order) {
                return -1;
            } else if (a.order > b.order) {
                return 1;
            }

            return 0;
        }

        function renderLabel(component) {
            const el = document.createElement("div")
            el.classList.add("form-label")
            el.textContent = component.label

            return el;
        }

        function renderTextbox(form, container, component) {
            const label = renderLabel(component);

            container.appendChild(label);

            const el = document.createElement("input")
            el.type = "text";
            el.placeholder = component.placeholder ? component.placeholder : "";
            el.textContent = component.label;
            el.required = component.required ? component.required : false;
            el.id = "input-" + component.name;
            el.oninput = (e) => {
                formValues[component.name] = e.target.value;
                validateForm(form);
            }

            container.appendChild(el);
        }

        function renderMultiline(form, container, component) {
            const label = renderLabel(component);

            container.appendChild(label);

            const el = document.createElement("textarea")
            el.placeholder = component.placeholder ? component.placeholder : "";
            el.id = "input-" + component.name;
            el.required = component.required ? component.required : false;
            el.oninput = (e) => {
                formValues[component.name] = e.target.value;
                validateForm(form);
            }

            container.appendChild(el);
        }

        function renderNumber(form, container, component) {
            const label = renderLabel(component);

            container.appendChild(label);

            const el = document.createElement("input")
            el.type = "number";
            el.placeholder = component.placeholder ? component.placeholder : "";
            el.textContent = component.label;
            el.id = "input-" + component.name;
            el.required = component.required ? component.required : false;
            el.oninput = (e) => {
                formValues[component.name] = e.target.value;
                validateForm(form);
            }

            container.appendChild(el);
        }

        function renderCheckbox(form, container, component) {

        }

        function renderPage(form, pageNumber) {
            const container = document.getElementById("form-body");
            if (!container) {
                return;
            }

            if (!form || form.pages.length < pageNumber) {
                return;
            }

            const page = form.pages[pageNumber];
            const pageContainer = document.createElement("div");
            pageContainer.id = "page-" + pageNumber;
            pageContainer.classList.add("form-page");
            pageContainer.classList.add("hidden");

            container.appendChild(pageContainer);
            const components = page.components.sort(sortFunction);

            for(let c = 0; c <components.length; c++) {
                const component = components[c];
                formValues[component.name] = null;

                switch (component.type) {
                    case "text":
                        renderTextbox(form, pageContainer, component);
                        break;

                    case "multiline":
                        renderMultiline(form, pageContainer, component);
                        break;

                    case "number":
                        renderNumber(form, pageContainer, component);
                        break;

                    case "boolean":
                        renderCheckbox(form, pageContainer, component);
                        break;

                    default:
                        renderTextbox(form, pageContainer, component);
                        break;
                }
            }
        }

        let currentPage = 0;

        function validateForm(form) {
            let validated = true;

            for (let p = 0; p < form.pages.length; p++) {
                for (let c = 0; c < form.pages[p].components.length; c++) {
                    if (form.pages[p].components[c].required) {
                        const input = document.getElementById("input-" + form.pages[p].components[c].name);
                        if (input && input.value === "") {
                            validated = false;
                        }
                    }
                }
            }

            const submit = document.getElementById("submit");
            if (submit) {
                if (validated) {
                    submit.classList.remove("disabled");
                } else {
                    submit.classList.add("disabled");
                }

                submit.disabled = !validated
            }
        }

        function setPage(form, page) {
            currentPage = page;
            if (currentPage < 0) {
                currentPage = 0;
            }

            if (currentPage > form.pages.length-1) {
                currentPage = form.pages.length-1;
            }

            const previous = document.getElementById("previous");
            if (previous) {
                previous.disabled = false;
                previous.classList.remove("disabled");

                if (currentPage === 0) {
                    previous.disabled = true;
                    previous.classList.add("disabled");
                }
            }

            const next = document.getElementById("next");
            if (next) {
                next.disabled = false;
                next.classList.remove("disabled");

                if (currentPage === form.pages.length-1) {
                    next.disabled = true;
                    next.classList.add("disabled");
                }
            }

            for (let p = 0;  p < form.pages.length; p++) {
                const pageContainer = document.getElementById("page-" + p);

                if (pageContainer) {
                    if (p === currentPage) {
                        pageContainer.classList.remove("hidden");
                    } else {
                        pageContainer.classList.add("hidden");
                    }
                }
            }

        }

        function renderForm() {
            const form = JSON.parse(formData);

            if (!form) {
                return;
            }

            const title = document.getElementById("form-header");
            if (title) {
                title.textContent = form.title;
            }
            const description = document.getElementById("form-description");
            if (description) {
                description.textContent = form.description;
            }

            for (let p = 0; p < form.pages.length; p++) {
                renderPage(form, p);
            }

            const container = document.getElementById("form-body");
            if (!container) {
                return;
            }

            const buttons = document.createElement("div");
            buttons.classList.add("button-container");


            if (form.pages.length > 1) {
                const previous = document.createElement("button");
                previous.innerText = "Previous";
                previous.id = "previous";
                previous.onclick = () => {
                    setPage(form, currentPage -= 1);
                }
                buttons.appendChild(previous);
                if (currentPage > 0) {

                }

                const next = document.createElement("button");
                next.innerText = "Next";
                next.id = "next";
                next.onclick = () => {
                    setPage(form, currentPage += 1);
                }
                buttons.appendChild(next);
            }

            const submit = document.createElement("button");
            submit.innerText = "Submit";
            submit.classList.add("disabled");
            submit.disabled = true;
            submit.id = "submit";
            submit.onclick = () => {
                submitForm(form);
            }
            buttons.appendChild(submit);

            container.appendChild(buttons);

            setPage(form, 0);
        }

        function submitForm(form) {
            console.log("Submitting", formValues);
            const submit = document.getElementById("submit");
            submit.disabled = true;
            submit.classList.add("disabled");

            const id = form.id;
            let xhr = new XMLHttpRequest();
            xhr.open("POST", "/form/" + id, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify(formValues));
            xhr.onerror = (e) => {
                submit.disabled = false;
                submit.classList.remove("disabled");
            }
            xhr.onload = (e) => {
                const container = document.getElementById("form-container");
                if (container) {
                    container.remove();
                }
            //     TODO: Redirect to a complete URL if set
            }
        }

        renderForm();
    </script>
</body>
</html>
